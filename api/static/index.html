<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conductor — Control Panel</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header id="banner">
    <h1>Conductor</h1>
    <div id="status-line">
      <span id="conn-dot" class="dot"></span>
      <span id="conn-text">…</span>
      <span class="mode" id="mode-badge">IDLE</span>
      <span class="muted" id="status-detail"></span>
    </div>
    <div id="toast"></div>
  </header>

  <main>
    <!-- Module 1: ESP32 connection / state -->
    <section class="card">
      <h2>ESP32 — État &amp; connexion</h2>
      <button id="esp-refresh">Rafraîchir l'état</button>
      <div id="esp-state" class="state-box muted">Non chargé.</div>
    </section>

    <!-- Module 2: ESP32 control -->
    <section class="card">
      <h2>ESP32 — Contrôle</h2>

      <fieldset>
        <legend>Host (destination des données)</legend>
        <label>IP <input id="host-ip" type="text" placeholder="auto-détecté si vide"></label>
        <button id="host-set">SET_HOST</button>
      </fieldset>

      <fieldset>
        <legend>Slot simple</legend>
        <label>Slot
          <select id="simple-slot"></select>
        </label>
        <label>État
          <select id="simple-enabled">
            <option value="true">on</option>
            <option value="false">off</option>
          </select>
        </label>
        <label>Hz <input id="simple-hz" type="number" value="50" min="1" step="1"></label>
        <button id="simple-set">SET_SIMPLE</button>
      </fieldset>

      <fieldset>
        <legend>Super slot</legend>
        <label>Slot <input id="super-slot" type="number" value="0" min="0" max="7"></label>
        <label>Deps (séparés par virgule) <input id="super-deps" type="text" value="0,6"></label>
        <label>Skip <input id="super-skip" type="number" value="1" min="1"></label>
        <button id="super-set">SET_SUPER</button>
        <button id="super-del" class="danger">DEL_SUPER</button>
      </fieldset>
    </section>

    <!-- Module 3: CSV recording -->
    <section class="card">
      <h2>Enregistrement CSV</h2>
      <div id="rec-status" class="state-box muted">…</div>
      <button id="rec-start">Démarrer</button>
      <button id="rec-stop" class="danger">Arrêter</button>
      <button id="rec-marker">Marqueur sync</button>
    </section>

    <!-- Module 4: Playback -->
    <section class="card">
      <h2>Playback</h2>
      <div class="row">
        <select id="session-select"></select>
        <button id="session-refresh">↻</button>
      </div>
      <label>Vitesse <input id="playback-speed" type="number" value="1" min="0.1" step="0.1"></label>
      <button id="playback-start">Lire</button>
      <button id="playback-stop" class="danger">Stop</button>
      <div id="playback-status" class="state-box muted">…</div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
