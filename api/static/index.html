<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conductor — Panneau de contrôle</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header id="banner">
    <h1>Conductor</h1>
    <div id="status-line">
      <span id="conn-dot" class="dot"></span>
      <span id="conn-text">…</span>
      <span class="mode" id="mode-badge">IDLE</span>
      <span class="muted" id="status-detail"></span>
    </div>
    <div id="toast"></div>
  </header>

  <main>
    <!-- Données live -->
    <section class="card">
      <h2>Données live</h2>
      <div class="live-grid">
        <div>
          <h3>Débit par type</h3>
          <table id="live-rates"><tbody></tbody></table>
        </div>
        <div>
          <h3>Dernières valeurs</h3>
          <div id="live-values" class="state-box">—</div>
        </div>
      </div>
    </section>

    <!-- ESP32 : état + contrôle -->
    <section class="card" id="esp-card">
      <h2>ESP32 — État &amp; contrôle</h2>
      <div class="row">
        <span id="esp-conn" class="muted">…</span>
      </div>

      <fieldset>
        <legend>Host (destination des données)</legend>
        <div class="row">
          <span>actuel : <b id="esp-host" class="mono">?</b></span>
        </div>
        <div class="row">
          <label>IP <input id="host-ip" type="text" placeholder="auto-détecté si vide"></label>
          <button id="host-set">SET_HOST</button>
        </div>
      </fieldset>

      <fieldset>
        <legend>Slots simples</legend>
        <div id="simple-rows" class="slot-list"><span class="muted">Non chargé.</span></div>
      </fieldset>

      <fieldset>
        <legend>Super-slots</legend>
        <div id="super-rows" class="slot-list"><span class="muted">Non chargé.</span></div>
        <div class="row add-super">
          <span>Ajouter :</span>
          <label>slot <input id="super-slot" type="number" value="0" min="0" max="7"></label>
          <label>deps <input id="super-deps" type="text" value="0,6"></label>
          <label>skip <input id="super-skip" type="number" value="1" min="1"></label>
          <button id="super-add">SET_SUPER</button>
        </div>
      </fieldset>

      <fieldset>
        <legend>Présets de configuration (locaux au navigateur)</legend>
        <div class="row">
          <input id="preset-name" type="text" placeholder="nom du préset">
          <button id="preset-save">Sauvegarder l'état courant</button>
        </div>
        <div id="preset-list" class="preset-list"></div>
      </fieldset>
    </section>

    <!-- Enregistrement CSV -->
    <section class="card">
      <h2>Enregistrement CSV</h2>
      <div id="rec-status" class="state-box muted">…</div>
      <button id="rec-start">Démarrer</button>
      <button id="rec-stop" class="danger">Arrêter</button>
      <button id="rec-marker">Marqueur sync</button>
    </section>

    <!-- Playback -->
    <section class="card">
      <h2>Playback</h2>
      <div class="row">
        <select id="session-select"></select>
        <button id="session-refresh">↻</button>
      </div>
      <div id="session-meta" class="muted"></div>
      <div class="row">
        <span>Vitesse</span>
        <button class="speed-preset" data-speed="0.5">0.5×</button>
        <button class="speed-preset" data-speed="1">1×</button>
        <button class="speed-preset" data-speed="2">2×</button>
        <input id="playback-speed" type="number" value="1" min="0.1" step="0.1">
        <label><input id="playback-loop" type="checkbox"> Boucle</label>
      </div>
      <div class="row">
        <button id="playback-start">Lire</button>
        <button id="playback-stop" class="danger">Stop</button>
      </div>
      <div class="progress"><div id="playback-bar" class="progress-bar"></div></div>
      <div id="playback-status" class="muted">Inactif.</div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
